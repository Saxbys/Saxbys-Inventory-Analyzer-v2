<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Saxbys Inventory Analyzer</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Georgia,serif;background:#F5F5F5;min-height:100vh}
button{cursor:pointer;font-family:inherit}
input{font-family:inherit;outline:none}
@keyframes spin{to{transform:rotate(360deg)}}
.spinner{width:48px;height:48px;border:3px solid #e0e0e0;border-top:3px solid #C8A84B;border-radius:50%;animation:spin .9s linear infinite;margin:0 auto}
table{width:100%;border-collapse:collapse;font-size:12px}
th{padding:7px 10px;background:#eaeaea;color:#444;font-weight:700;border-bottom:1px solid #ccc;font-size:11px;font-family:sans-serif;white-space:nowrap;text-align:right}
th.left{text-align:left}
td{padding:7px 10px;border-bottom:1px solid #ddd;font-family:sans-serif;vertical-align:top;text-align:right}
td.left{text-align:left}
.badge{border-radius:5px;padding:3px 10px;font-size:10px;font-weight:700;white-space:nowrap;font-family:sans-serif;color:#fff;display:inline-block}
@media print{.noprint{display:none!important}body{-webkit-print-color-adjust:exact;print-color-adjust:exact}@page{margin:1.2cm}}
</style>
</head>
<body>
<div id="app"></div>
<script>
var GRN="#1E5631",GRN2="#163D22",GRN3="#0F2714",GOLD="#C8A84B";
var RED="#C0392B",AMB="#E67E22",PUR="#7D3C98",BLU="#1A5276";
var LRED="#FDEDEC",LAMB="#FEF9EC",LGRN="#EAF4EC",LPUR="#F5EEF8",LBLU="#EBF5FB";
var LGR="#F5F5F5",MGR="#CCCCCC",DGR="#444444",WHT="#FFFFFF";
var DARK_RED="#C0392B",MED_RED="#E74C3C";

// ── STATE ─────────────────────────────────────────────────────
var state={screen:"upload",file:null,rawRows:[],location:"Wellesley",driveFolder:"",report:null,error:"",fileName:"",attempt:1,ogFile:null,orderGuide:null,ogError:"",ogFilter:"all",ogFileName:"",ogStats:null};
function setState(p){Object.assign(state,p);render();}

// ── FORMATTERS ────────────────────────────────────────────────
function fmt(n){if(n==null||n===""||isNaN(n))return"—";return Number(n).toLocaleString(undefined,{maximumFractionDigits:2});}
function usd(n){if(!n&&n!==0||isNaN(n))return"—";return"$"+Number(n).toFixed(2);}
function parseFileName(name){
  var m=name.match(/(\d{2})_(\d{2})_(\d{4})_to_(\d{2})_(\d{2})_(\d{4})/);
  if(!m)return{opening:"",closing:"",label:name};
  var mo=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  var fd=function(mm,dd,yy){return mo[parseInt(mm,10)-1]+" "+parseInt(dd,10)+", "+yy;};
  return{opening:"Opening: "+fd(m[1],m[2],m[3]),closing:"Closing: "+fd(m[4],m[5],m[6]),
    label:fd(m[1],m[2],m[3])+" → "+fd(m[4],m[5],m[6])};
}

// ── PARSE EXCEL ───────────────────────────────────────────────
function parseXtraCHEF(file){
  return new Promise(function(res,rej){
    var reader=new FileReader();
    reader.onload=function(e){
      try{
        var wb=XLSX.read(new Uint8Array(e.target.result),{type:"array"});
        var ws=wb.Sheets[wb.SheetNames[0]];
        var rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:""});
        var hi=rows.findIndex(function(r){return r.some(function(c){return String(c).trim()==="Product";});});
        if(hi<0)throw new Error("No 'Product' column found. Upload the xtraCHEF Actual vs. Theoretical export.");
        var headers=rows[hi].map(function(h){return String(h||"").trim();});
        var data=rows.slice(hi+1).filter(function(r){return String(r[0]||"").trim();})
          .map(function(r){var o={};headers.forEach(function(h,i){o[h]=r[i]??"";});return o;});
        res(data);
      }catch(err){rej(err);}
    };
    reader.onerror=function(){rej(new Error("Failed to read file."));};
    reader.readAsArrayBuffer(file);
  });
}

// ── RULE-BASED ANALYSIS ───────────────────────────────────────
function analyze(rows){
  var items=rows.map(function(r){
    return{
      item:String(r["Product"]||"").trim(),
      unit:String(r["Product Unit"]||"").trim(),
      category:String(r["Category"]||r["Sub-Category"]||"Other").trim(),
      opening:parseFloat(r["Opening Inventory (Qty)"])||0,
      purchased:parseFloat(r["Purchase (Qty)"])||0,
      waste:parseFloat(r["Waste (Qty)"])||0,
      closing:parseFloat(r["Closing Inventory (Qty)"])||0,
      actual:parseFloat(r["Actual Consumption (Qty)"])||0,
      actualCost:parseFloat(r["Actual Consumption (Cost)"])||0,
      wasteCost:parseFloat(r["Waste (Cost)"])||0,
      unitPrice:parseFloat(r["Unit Price"])||0,
    };
  }).filter(function(i){return i.item;});

  var flags=[],neg=[],high=[],waste=[],zero=[];

  items.forEach(function(i){
    if(i.waste>0) waste.push({item:i.item,unit:i.unit,wasteQty:i.waste,wasteCost:i.wasteCost||i.waste*i.unitPrice});
    if(i.opening>50&&i.actual===0&&i.purchased===0)
      zero.push({item:i.item,unit:i.unit,onHand:i.closing||i.opening});

    // Data integrity: impossibly large opening
    if(i.opening>10000&&i.unitPrice>0.50){
      flags.push({item:i.item,unit:i.unit,severity:"red",
        opening:i.opening,purchased:i.purchased,closing:i.closing,actual:i.actual,
        actualCost:i.opening*i.unitPrice,
        issue:"Opening count of "+fmt(i.opening)+" is unusually large — likely UOM error."});
      return;
    }
    // Phantom stock
    if(i.closing>0&&i.opening===0&&i.purchased===0&&i.waste===0){
      flags.push({item:i.item,unit:i.unit,severity:"amber",
        opening:i.opening,purchased:i.purchased,closing:i.closing,actual:-(i.closing),
        actualCost:i.closing*i.unitPrice,
        issue:"Stock at closing with no opening or purchases recorded."});
      return;
    }
    // Negative consumption
    var math=(i.opening+i.purchased-i.waste)-i.closing;
    if(math<0||i.actual<0){
      var na=Math.min(math,i.actual);
      neg.push({item:i.item,unit:i.unit,opening:i.opening,purchased:i.purchased,
        waste:i.waste,closing:i.closing,actual:na,actualCost:Math.abs(na)*i.unitPrice});
    }
  });

  var flaggedNames=new Set(flags.map(function(f){return f.item;}).concat(neg.map(function(n){return n.item;})));
  high=items.filter(function(i){return i.actual>0&&i.actualCost>0&&!flaggedNames.has(i.item);})
    .sort(function(a,b){return b.actualCost-a.actualCost;}).slice(0,12)
    .map(function(i){return{item:i.item,unit:i.unit,actualQty:i.actual,actualCost:i.actualCost};});

  var negNames=new Set(neg.map(function(n){return n.item.toLowerCase();}));
  flags=flags.filter(function(f){return!negNames.has(f.item.toLowerCase());});
  flags.sort(function(a,b){return(b.actualCost||0)-(a.actualCost||0);});
  neg.sort(function(a,b){return(b.actualCost||0)-(a.actualCost||0);});
  waste.sort(function(a,b){return(b.wasteCost||0)-(a.wasteCost||0);});

  var allRecount=flags.map(function(f){return Object.assign({},f,{_type:"flag"});})
    .concat(neg.map(function(n){return Object.assign({},n,{_type:"neg"});}))
    .sort(function(a,b){return(b.actualCost||0)-(a.actualCost||0);});

  var criticalCount=allRecount.filter(function(r){return(parseFloat(r.actualCost)||0)>=30;}).length;
  var totalWaste=waste.reduce(function(s,w){return s+(w.wasteCost||0);},0);

  var summary=allRecount.length===0
    ?"All items passed. No critical or attention flags this period — inventory data is clean."
    :allRecount.length+" item(s) need attention"+(allRecount[0]?" — highest impact: "+allRecount[0].item+" ("+usd(allRecount[0].actualCost||0)+")":" ")+". "
    +"Total waste: "+usd(totalWaste)+".";

  return{allRecount,highConsumption:high,wasteEvents:waste,zeroMovement:zero,
    totalWasteCost:totalWaste,criticalCount,summary};
}

// ── DOWNLOAD CLEAN EXCEL ──────────────────────────────────────
function downloadCleanExcel(rows,location,fileName){
  var parsed=parseFileName(fileName);
  var period=parsed.label||fileName;
  var headers=["Location","Period","Product","Category","UOM",
    "Opening Qty","Purchased Qty","Closing Qty","Actual Qty","Actual Cost ($)",
    "Unit Price ($)","Waste Qty","Waste Cost ($)"];

  var dataRows=rows.map(function(r){
    return[
      location,
      period,
      String(r["Product"]||"").trim(),
      String(r["Category"]||r["Sub-Category"]||"").trim(),
      String(r["Product Unit"]||"").trim(),
      parseFloat(r["Opening Inventory (Qty)"])||0,
      parseFloat(r["Purchase (Qty)"])||0,
      parseFloat(r["Closing Inventory (Qty)"])||0,
      parseFloat(r["Actual Consumption (Qty)"])||0,
      parseFloat(r["Actual Consumption (Cost)"])||0,
      parseFloat(r["Unit Price"])||0,
      parseFloat(r["Waste (Qty)"])||0,
      parseFloat(r["Waste (Cost)"])||0,
    ];
  }).filter(function(r){return r[2];});

  var wsData=[headers].concat(dataRows);
  var ws=XLSX.utils.aoa_to_sheet(wsData);

  // Column widths
  ws["!cols"]=[
    {wch:16},{wch:28},{wch:36},{wch:22},{wch:10},
    {wch:12},{wch:13},{wch:12},{wch:11},{wch:14},
    {wch:13},{wch:11},{wch:13}
  ];

  // Header row styling (bold green)
  headers.forEach(function(_,ci){
    var addr=XLSX.utils.encode_cell({r:0,c:ci});
    if(!ws[addr])return;
    ws[addr].s={font:{bold:true,color:{rgb:"FFFFFF"}},fill:{fgColor:{rgb:"1E5631"}},alignment:{horizontal:"center"}};
  });

  var wb=XLSX.utils.book_new();
  var safeLoc=location.replace(/[^a-zA-Z0-9]/g,"_").slice(0,28);
  var date=new Date().toISOString().slice(0,10);
  XLSX.utils.book_append_sheet(wb,ws,safeLoc+"_"+date);
  XLSX.writeFile(wb,safeLoc+"_Verified_Inventory_Report_"+date+".xlsx");
}

// ── RUN ───────────────────────────────────────────────────────
function run(){
  if(!state.file){setState({error:"Please upload the xtraCHEF report."});return;}
  setState({screen:"processing",error:""});
  parseXtraCHEF(state.file).then(function(data){
    var report=analyze(data);
    report.location=state.location;
    report.parsed=parseFileName(state.file.name);
    setState({screen:"results",report:report,rawRows:data,fileName:state.file.name});
  }).catch(function(err){
    setState({screen:"error",error:err.message||"Something went wrong."});
  });
}

// ── DOM HELPERS ───────────────────────────────────────────────
function h(tag,css,html,attrs){
  var e=document.createElement(tag);
  if(css)Object.assign(e.style,css);
  if(attrs)Object.entries(attrs).forEach(function(kv){
    if(kv[0].startsWith("on"))e.addEventListener(kv[0].slice(2).toLowerCase(),kv[1]);
    else e.setAttribute(kv[0],kv[1]);
  });
  if(html!=null){if(typeof html==="string")e.innerHTML=html;
  else if(Array.isArray(html))html.forEach(function(c){if(c)e.appendChild(c);});
  else e.appendChild(html);}
  return e;
}
function d(css,html,attrs){return h("div",css,html,attrs);}

function badge(cost){
  var n=parseFloat(cost)||0;
  var el=document.createElement("span");el.className="badge";
  if(n>=100){el.style.background=DARK_RED;el.textContent="🚨 CRITICAL";}
  else if(n>=30){el.style.background=MED_RED;el.textContent="📢 ATTENTION";}
  else{el.style.background=AMB;el.textContent="⚠️ DOUBLE CHECK";}
  return el;
}

function section(title,color,count,tbl){
  var wrap=d({marginBottom:"24px"});
  wrap.appendChild(d({background:color,borderRadius:"10px 10px 0 0",padding:"10px 16px",display:"flex",justifyContent:"space-between",alignItems:"center"},[
    h("span",{color:WHT,fontWeight:"700",fontSize:"13px",letterSpacing:".02em"},title),
    h("span",{background:"rgba(255,255,255,.22)",color:WHT,borderRadius:"20px",padding:"2px 12px",fontSize:"12px",fontWeight:"700"},String(count)+" items")
  ]));
  var tw=d({border:"1px solid "+MGR,borderTop:"none",borderRadius:"0 0 10px 10px",overflow:"hidden"});
  tw.appendChild(tbl);wrap.appendChild(tw);return wrap;
}

function makeTable(headers,data,rowFn,evenBg,oddBg){
  var tbl=document.createElement("table");
  var thead=document.createElement("thead");
  var hr=document.createElement("tr");
  headers.forEach(function(hh){var t=document.createElement("th");t.innerHTML=hh.l;if(hh.left)t.className="left";hr.appendChild(t);});
  thead.appendChild(hr);tbl.appendChild(thead);
  var tbody=document.createElement("tbody");
  data.forEach(function(row,ri){
    var tr=document.createElement("tr");tr.style.background=ri%2===0?evenBg:oddBg;
    rowFn(row,tr);tbody.appendChild(tr);
  });
  tbl.appendChild(tbody);return tbl;
}

function cell(content,left,color,bold){
  var td=document.createElement("td");
  if(left)td.className="left";
  if(color)td.style.color=color;
  if(bold)td.style.fontWeight="700";
  if(typeof content==="string"||typeof content==="number")td.innerHTML=String(content);
  else if(content instanceof Element)td.appendChild(content);
  return td;
}

function itemName(item,unit){
  var el=document.createElement("b");el.textContent=item;
  if(unit){var u=document.createElement("span");u.textContent=" ("+unit+")";
    Object.assign(u.style,{color:"#888",fontWeight:"400",fontSize:"11px"});el.appendChild(u);}
  return el;
}

// ── DROP ZONE COMPONENT ───────────────────────────────────────
function makeDropZone(onFile,currentFile,compact,label){
  var dropLabel=label||"Drop Daily Summary Download .xlsx here";
  var fi=document.createElement("input");fi.type="file";fi.accept=".xlsx,.xls";fi.style.display="none";
  fi.addEventListener("change",function(){if(fi.files[0])onFile(fi.files[0]);});
  var dz=d({border:"2px dashed "+(currentFile?GRN:MGR),borderRadius:"12px",
    padding:compact?"16px":"28px 20px",textAlign:"center",cursor:"pointer",
    background:currentFile?LGRN:WHT,transition:"all .2s",marginBottom:"16px"});
  if(currentFile){
    dz.appendChild(d({fontSize:"22px",marginBottom:"4px"},"✅"));
    dz.appendChild(d({fontWeight:"700",color:GRN,fontSize:"13px"},currentFile.name));
    dz.appendChild(d({color:"#999",fontSize:"11px",marginTop:"2px"},"Click to replace"));
  }else{
    dz.appendChild(d({fontSize:compact?"24px":"32px",marginBottom:"4px"},"📊"));
    dz.appendChild(d({fontWeight:"700",color:DGR,fontSize:compact?"13px":"14px",marginBottom:"2px"},dropLabel));
    dz.appendChild(d({color:"#aaa",fontSize:"12px"},"Drag & drop or click to browse"));
  }
  dz.appendChild(fi);
  dz.addEventListener("dragover",function(e){e.preventDefault();dz.style.borderColor=GRN;dz.style.background=LGRN;});
  dz.addEventListener("dragleave",function(){dz.style.borderColor=currentFile?GRN:MGR;dz.style.background=currentFile?LGRN:WHT;});
  dz.addEventListener("drop",function(e){e.preventDefault();if(e.dataTransfer.files[0])onFile(e.dataTransfer.files[0]);});
  dz.addEventListener("click",function(e){if(e.target!==fi)fi.click();});
  return dz;
}

// ── SCREENS ───────────────────────────────────────────────────
function screenUpload(){
  var wrap=d({minHeight:"100vh",background:"linear-gradient(160deg,"+GRN3+" 0%,"+GRN2+" 45%,#1a2e1d 100%)",display:"flex",flexDirection:"column"});
  wrap.appendChild(d({padding:"26px 36px",display:"flex",alignItems:"center",gap:"14px"},[
    d({width:"44px",height:"44px",background:GOLD,borderRadius:"10px",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:"900",color:GRN,fontSize:"22px"},"S"),
    d({},[d({color:WHT,fontWeight:"700",fontSize:"20px",letterSpacing:"-.02em"},"Inventory Analyzer"),
      d({color:GOLD,fontSize:"11px",fontFamily:"sans-serif",letterSpacing:".08em",textTransform:"uppercase"},"xtraCHEF · Weekly Analysis")])
  ]));
  var card=d({background:WHT,borderRadius:"20px",padding:"34px 38px",width:"100%",maxWidth:"520px",boxShadow:"0 24px 80px rgba(0,0,0,.3)"});
  card.appendChild(d({fontSize:"22px",fontWeight:"700",color:GRN,marginBottom:"8px"},"Weekly Inventory Analysis"));
  card.appendChild(d({color:"#777",fontSize:"13px",fontFamily:"sans-serif",lineHeight:"1.6",marginBottom:"22px"},
    "Upload the <b>Actual vs. Theoretical</b> export from xtraCHEF. The app flags items to recount, tracks waste, and only approves a clean download when inventory is verified."));

  var locInput=document.createElement("input");
  locInput.type="text";locInput.value=state.location;locInput.placeholder="e.g. Wellesley";
  Object.assign(locInput.style,{width:"100%",padding:"11px 14px",borderRadius:"10px",border:"1.5px solid "+MGR,fontSize:"14px",fontFamily:"sans-serif",color:DGR,display:"block"});
  locInput.addEventListener("input",function(){state.location=locInput.value;});
  locInput.addEventListener("focus",function(){locInput.style.borderColor=GRN;});
  locInput.addEventListener("blur",function(){locInput.style.borderColor=MGR;});
  card.appendChild(d({marginBottom:"16px"},[h("label",{fontWeight:"700",fontSize:"13px",color:DGR,display:"block",marginBottom:"6px",fontFamily:"sans-serif"},"Location"),locInput]));

  // Drive folder URL input
  var driveFolderInput=document.createElement("input");
  driveFolderInput.type="text";driveFolderInput.value=state.driveFolder;
  driveFolderInput.placeholder="https://drive.google.com/drive/folders/...";
  Object.assign(driveFolderInput.style,{width:"100%",padding:"11px 14px",borderRadius:"10px",border:"1.5px solid "+MGR,fontSize:"13px",fontFamily:"sans-serif",color:DGR,display:"block"});
  driveFolderInput.addEventListener("input",function(){state.driveFolder=driveFolderInput.value;});
  driveFolderInput.addEventListener("focus",function(){driveFolderInput.style.borderColor=GRN;});
  driveFolderInput.addEventListener("blur",function(){driveFolderInput.style.borderColor=MGR;});
  card.appendChild(d({marginBottom:"18px"},[
    h("label",{fontWeight:"700",fontSize:"13px",color:DGR,display:"block",marginBottom:"6px",fontFamily:"sans-serif"},"Google Drive Folder URL"),
    driveFolderInput,
    d({fontSize:"11px",color:"#999",marginTop:"4px",fontFamily:"sans-serif"},"Open your Drive folder → copy the URL from the browser address bar · Used to open Drive after download")
  ]));

  card.appendChild(makeDropZone(function(f){state.file=f;render();},state.file,false,"Drop Actual vs. Theoretical Report from xtraCHEF"));

  if(state.error)card.appendChild(d({background:LRED,border:"1px solid "+RED,borderRadius:"8px",padding:"10px 14px",marginBottom:"14px",color:RED,fontSize:"13px",fontFamily:"sans-serif"},state.error));

  var btn=document.createElement("button");
  btn.textContent=state.file?"Run Analysis →":"Upload File to Continue";
  Object.assign(btn.style,{width:"100%",padding:"15px",borderRadius:"12px",border:"none",background:state.file?GRN:MGR,color:WHT,fontSize:"15px",fontWeight:"700",fontFamily:"Georgia,serif",transition:"all .2s"});
  btn.addEventListener("click",function(){if(state.file)run();});
  card.appendChild(btn);

  wrap.appendChild(d({flex:"1",display:"flex",alignItems:"center",justifyContent:"center",padding:"16px 20px"},card));
  wrap.appendChild(d({padding:"14px",textAlign:"center",color:"rgba(255,255,255,.3)",fontSize:"11px",fontFamily:"sans-serif"},"CONFIDENTIAL · Internal Use Only"));
  return wrap;
}

function screenProcessing(){
  var wrap=d({minHeight:"100vh",background:"linear-gradient(160deg,"+GRN3+" 0%,"+GRN2+" 45%,#1a2e1d 100%)",display:"flex",alignItems:"center",justifyContent:"center"});
  var inner=d({textAlign:"center",padding:"40px"});
  var sp=document.createElement("div");sp.className="spinner";inner.appendChild(sp);
  inner.appendChild(d({color:WHT,fontWeight:"700",fontSize:"20px",marginTop:"22px",fontFamily:"Georgia,serif"},"Analyzing Inventory…"));
  inner.appendChild(d({color:GOLD,fontSize:"13px",marginTop:"8px",fontFamily:"sans-serif"},"Running checks — no AI required"));
  wrap.appendChild(inner);return wrap;
}

function screenResults(){
  var r=state.report;
  var isClean=r.criticalCount===0;
  if(isClean&&!state._autoDownloaded){
    state._autoDownloaded=true;
    setTimeout(function(){downloadCleanExcel(state.rawRows,state.location,state.fileName);},600);
  }
  var wrap=d({minHeight:"100vh",background:LGR});

  // Nav
  var nav=d({background:GRN,padding:"13px 28px",display:"flex",alignItems:"center",justifyContent:"space-between",position:"sticky",top:"0",zIndex:"100",boxShadow:"0 2px 8px rgba(0,0,0,.15)"});
  nav.className="noprint";
  nav.appendChild(d({display:"flex",alignItems:"center",gap:"12px"},[
    d({width:"34px",height:"34px",background:GOLD,borderRadius:"7px",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:"900",color:GRN,fontSize:"17px"},"S"),
    d({},[
      d({color:WHT,fontWeight:"700",fontSize:"15px",fontFamily:"Georgia,serif"},(r.location||"Saxbys")+" — Inventory Analysis"),
      d({color:"rgba(255,255,255,.6)",fontSize:"11px",fontFamily:"sans-serif"},
        r.parsed&&r.parsed.opening?r.parsed.opening+" · "+r.parsed.closing:state.fileName)
    ])
  ]));
  var navBtns=d({display:"flex",gap:"10px"});
  var btnBack=document.createElement("button");btnBack.textContent="← New Report";
  Object.assign(btnBack.style,{padding:"7px 16px",borderRadius:"7px",border:"1.5px solid "+GOLD,background:"transparent",color:GOLD,fontWeight:"700",fontSize:"13px",fontFamily:"sans-serif"});
  btnBack.addEventListener("click",function(){setState({screen:"upload",report:null,file:null,rawRows:[],error:"",attempt:1,_autoDownloaded:false});});
  navBtns.appendChild(btnBack);

  if(isClean){
    var btnDl=document.createElement("button");btnDl.textContent="⬇️ Download Clean Excel";
    Object.assign(btnDl.style,{padding:"7px 20px",borderRadius:"7px",border:"none",background:GOLD,color:GRN,fontWeight:"700",fontSize:"13px",fontFamily:"sans-serif"});
    btnDl.addEventListener("click",function(){downloadCleanExcel(state.rawRows,state.location,state.fileName);});
    navBtns.appendChild(btnDl);
    var btnOG=document.createElement("button");btnOG.textContent="📋 Order Guide →";
    Object.assign(btnOG.style,{padding:"7px 20px",borderRadius:"7px",border:"none",background:GRN,color:GOLD,fontWeight:"700",fontSize:"13px",fontFamily:"sans-serif",border:"2px solid "+GOLD});
    btnOG.addEventListener("click",function(){setState({screen:"orderguide",ogFile:null,orderGuide:null,ogError:""});});
    navBtns.appendChild(btnOG);
  }
  nav.appendChild(navBtns);wrap.appendChild(nav);

  var body=d({padding:"24px 20px"});
  var inner=d({maxWidth:"960px",margin:"0 auto"});

  // Summary box
  var sumColor=isClean?GRN:RED;
  var sumBg=isClean?LGRN:LRED;

// ── ORDER GUIDE: PARSE DAILY SUMMARY ────────────────────────
// Columns: B=Description C=UOM F=Inventory Counts G=Total Count
//          H=Inventory Par I=Total Par J=Inventory Delta K=Vendors
//          L=Categories N=Unit Price O=Total Inventory Cost
function ogParseDailySummary(file){
  return new Promise(function(res,rej){
    var reader=new FileReader();
    reader.onload=function(e){
      try{
        var wb=XLSX.read(new Uint8Array(e.target.result),{type:"array"});
        var ws=wb.Sheets[wb.SheetNames[0]];
        var rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:""});
        var hi=rows.findIndex(function(r){
          return r.some(function(c){return String(c).trim()==="Description";})&&
                 r.some(function(c){return String(c).trim().startsWith("Inventory Counts");});
        });
        if(hi<0)throw new Error("This doesn't look like a Daily Summary file.\n\nIn xtraCHEF: Inventory → Inventory Count → select the inventory day → check Inventory → Download Daily Summary.");
        var toN=function(v){var n=parseFloat(v);return isNaN(n)?null:n;};
        var items=rows.slice(hi+1).filter(function(r){return String(r[1]||"").trim();})
          .map(function(r){return{
            product:  String(r[1]||"").trim(),
            uom:      String(r[2]||"").trim(),
            onHand:   toN(r[6])!=null?toN(r[6]):toN(r[5])!=null?toN(r[5]):0,
            parLevel: toN(r[8])!=null?toN(r[8]):toN(r[7])!=null?toN(r[7]):null,
            delta:    toN(r[9])!=null?toN(r[9]):null,
            category: String(r[11]||r[12]||"Other").trim().split(",")[0].trim()||"Other",
            vendor:   String(r[10]||"").trim()||"No Vendor",
            unitPrice:toN(r[13])||0,
            totalCost:toN(r[14])||0,
          };}).filter(function(i){return i.product;});
        res(items);
      }catch(err){rej(err);}
    };
    reader.onerror=function(){rej(new Error("Failed to read file."));};
    reader.readAsArrayBuffer(file);
  });
}

var OG_CAT_ORDER=[
  "Food Service Inventory","Bakery Inventory","Smoothies Inventory",
  "Menu Drinks Inventory","Retail Inventory",
  "Cafe Supplies (OPEX)","Drink Supplies (OPEX)","Food Supplies (OPEX)",
  "Janitorial Supplies (OPEX)","Other"
];

function ogCalcNeedToOrder(delta){
  if(delta==null)return null;
  return delta<0?Math.ceil(Math.abs(delta)):0;
}

function ogBuildGuide(items){
  var map={};
  items.forEach(function(item){
    var cat=item.category||"Other";
    if(!map[cat])map[cat]=[];
    map[cat].push(item);
  });
  var cats=OG_CAT_ORDER.filter(function(c){return map[c];})
    .concat(Object.keys(map).filter(function(c){return OG_CAT_ORDER.indexOf(c)<0;}).sort());
  return cats.map(function(cat){
    return{category:cat,items:map[cat].map(function(item){
      var need=ogCalcNeedToOrder(item.delta);
      return Object.assign({},item,{
        category:cat,needToOrder:need,
        hasParLevel:item.parLevel!=null,
        needsOrder:need!=null&&need>0
      });
    })};
  });
}

  var body=d({padding:"24px 20px"});
  var inner=d({maxWidth:"1060px",margin:"0 auto"});

  // ── UPLOAD PROMPT ──────────────────────────────────────────
  if(!state.orderGuide){
    var card=d({background:WHT,borderRadius:"20px",padding:"32px 36px",maxWidth:"520px",margin:"0 auto",boxShadow:"0 8px 40px rgba(0,0,0,.1)"});
    card.appendChild(d({fontSize:"20px",fontWeight:"700",color:GRN,marginBottom:"6px"},"Generate Order Guide"));
    card.appendChild(d({color:"#777",fontSize:"13px",fontFamily:"sans-serif",lineHeight:"1.6",marginBottom:"12px"},
      "Inventory is verified ✅ Upload the <b>Daily Summary Download</b> from xtraCHEF to generate the order guide with current stock levels, par levels, and need-to-order quantities."));
    card.appendChild(d({background:LGRN,border:"1px solid #b7d9c0",borderRadius:"10px",padding:"10px 14px",marginBottom:"18px",fontSize:"12px",fontFamily:"sans-serif",color:GRN},
      "<b>In xtraCHEF:</b> Inventory → Inventory Count → select the inventory day → check Inventory → Download Daily Summary"));
    card.appendChild(makeDropZone(function(f){state.ogFile=f;render();},state.ogFile,false));
    if(state.ogError)card.appendChild(d({background:LRED,border:"1px solid "+RED,borderRadius:"8px",padding:"10px 14px",marginBottom:"14px",color:RED,fontSize:"13px",fontFamily:"sans-serif"},state.ogError));
    var genBtn=document.createElement("button");
    genBtn.textContent=state.ogFile?"Generate Order Guide →":"Upload Daily Summary to Continue";
    Object.assign(genBtn.style,{width:"100%",padding:"14px",borderRadius:"12px",border:"none",background:state.ogFile?GRN:MGR,color:WHT,fontSize:"15px",fontWeight:"700",fontFamily:"Georgia,serif",transition:"all .2s",cursor:state.ogFile?"pointer":"default"});
    genBtn.addEventListener("click",function(){
      if(!state.ogFile)return;
      setState({ogError:""});
      ogParseDailySummary(state.ogFile).then(function(items){
        var guide=ogBuildGuide(items);
        var totalItems=guide.reduce(function(s,c){return s+c.items.length;},0);
        var needOrder=guide.reduce(function(s,c){return s+c.items.filter(function(i){return i.needsOrder;}).length;},0);
        var hasPar=guide.reduce(function(s,c){return s+c.items.filter(function(i){return i.hasParLevel;}).length;},0);
        var totalValue=guide.reduce(function(s,c){return s+c.items.reduce(function(ss,i){return ss+(i.totalCost||0);},0);},0);
        setState({orderGuide:guide,ogFilter:"all",ogFileName:state.ogFile.name,
          ogStats:{totalItems:totalItems,needOrder:needOrder,hasPar:hasPar,totalValue:totalValue},screen:"orderguide"});
      }).catch(function(err){setState({ogError:err.message||"Could not parse file.",screen:"orderguide"});});
    });
    card.appendChild(genBtn);
    inner.appendChild(card);body.appendChild(inner);wrap.appendChild(body);return wrap;
  }

  // ── GUIDE RESULTS ──────────────────────────────────────────
  var guide=state.orderGuide;
  var st=state.ogStats||{};
  var filter=state.ogFilter||"all";

  // Stat cards
  var statsRow=d({display:"flex",gap:"10px",marginBottom:"18px",flexWrap:"wrap"});
  [
    {n:st.totalItems,     label:"Total Items",       color:GRN, bg:LGRN},
    {n:st.hasPar,         label:"Par Levels Set",    color:BLU, bg:LBLU},
    {n:st.needOrder,      label:"Need to Order 🛒",  color:AMB, bg:LAMB},
    {n:"$"+(st.totalValue||0).toFixed(2), label:"On-Hand Value", color:GRN, bg:"#f0f7f2"},
  ].forEach(function(s){
    var c=d({flex:"1 1 130px",background:s.bg,border:"2px solid "+s.color,borderRadius:"12px",padding:"14px 10px",textAlign:"center"});
    c.appendChild(d({fontSize:typeof s.n==="string"?16:24,fontWeight:"900",color:s.color,lineHeight:"1"},String(s.n)));
    c.appendChild(d({fontSize:"11px",color:DGR,marginTop:"5px",fontFamily:"sans-serif",lineHeight:"1.3"},s.label));
    statsRow.appendChild(c);
  });
  inner.appendChild(statsRow);

  // Par level warning
  if(st.hasPar<st.totalItems){
    inner.appendChild(d({background:LAMB,border:"1px solid #f0c080",borderRadius:"10px",padding:"12px 16px",marginBottom:"16px",fontSize:"13px",fontFamily:"sans-serif",color:"#7a4a00"},
      "<b>⚠️ "+(st.totalItems-st.hasPar)+" items have no par level set in xtraCHEF.</b> These show on-hand count only. Add par levels in xtraCHEF → Inventory → Items to enable auto calculation."));
  }

  // Filter tabs
  var tabRow=d({display:"flex",gap:"8px",marginBottom:"18px",flexWrap:"wrap"});
  [
    {key:"all",  label:"All Items ("+st.totalItems+")"},
    {key:"order",label:"🛒 Need to Order ("+st.needOrder+")"},
    {key:"par",  label:"With Par Level ("+st.hasPar+")"},
  ].forEach(function(f){
    var btn=document.createElement("button");btn.textContent=f.label;
    var isActive=filter===f.key;
    var activeColor=f.key==="order"?AMB:GRN;
    Object.assign(btn.style,{padding:"8px 18px",borderRadius:"20px",border:"1.5px solid "+(isActive?activeColor:MGR),
      background:isActive?activeColor:WHT,color:isActive?WHT:DGR,fontWeight:"700",cursor:"pointer",fontSize:"13px",fontFamily:"sans-serif",transition:"all .15s"});
    btn.addEventListener("click",function(){state.ogFilter=f.key;render();});
    tabRow.appendChild(btn);
  });
  inner.appendChild(tabRow);

  // ── NEED TO ORDER TAB → vendor grouping ───────────────────
  if(filter==="order"){
    var vendorMap={};
    guide.forEach(function(cat){
      cat.items.filter(function(i){return i.needsOrder;}).forEach(function(item){
        var v=item.vendor||"No Vendor";
        if(!vendorMap[v])vendorMap[v]=[];
        vendorMap[v].push(item);
      });
    });
    var vendors=Object.keys(vendorMap).sort();
    if(vendors.length===0){
      inner.appendChild(d({background:WHT,border:"1.5px dashed "+MGR,borderRadius:"12px",padding:"32px",textAlign:"center",color:"#aaa",fontFamily:"sans-serif",fontSize:"14px"},
        "No items need ordering based on the Inventory Delta in this file."));
    } else {
      vendors.forEach(function(vendor){
        var sortedItems=vendorMap[vendor].sort(function(a,b){return a.product.localeCompare(b.product);});
        inner.appendChild(ogVendorTable(vendor,sortedItems));
      });
    }
  }

  // ── ALL ITEMS + WITH PAR LEVEL TABS → category grouping ───
  if(filter!=="order"){
    var shown=guide.map(function(cat){
      return Object.assign({},cat,{items:cat.items.filter(function(i){
        return filter==="par"?i.hasParLevel:true;
      })});
    }).filter(function(cat){return cat.items.length>0;});
    if(shown.length===0){
      inner.appendChild(d({background:WHT,border:"1.5px dashed "+MGR,borderRadius:"12px",padding:"32px",textAlign:"center",color:"#aaa",fontFamily:"sans-serif",fontSize:"14px"},"No items to display."));
    } else {
      shown.forEach(function(cat){inner.appendChild(ogCategoryTable(cat));});
    }
  }

  inner.appendChild(d({textAlign:"center",color:"#bbb",fontSize:"11px",paddingTop:"14px",borderTop:"1px solid "+MGR,paddingBottom:"28px",fontFamily:"sans-serif"},
    "Saxbys Order Guide · "+(state.location||"")+" · "+(state.ogFileName||"")+" · "+new Date().toLocaleDateString()));

  body.appendChild(inner);wrap.appendChild(body);return wrap;
}

// ── DOWNLOAD ORDER GUIDE EXCEL ────────────────────────────────
function downloadOrderGuideExcel(guide,location){
  var headers=["Category","Product","UOM","On Hand","Par Level (Case)","Need to Order (Case)","Unit Price ($)","On-Hand Value ($)","Vendor"];
  var rows=[headers];
  guide.forEach(function(cat){
    cat.items.forEach(function(item){
      rows.push([cat.category,item.product,item.uom,item.onHand,
        item.hasParLevel?item.parLevel:"",
        item.needToOrder!=null?item.needToOrder:"",
        item.unitPrice||"",item.totalCost||"",item.vendor||""]);
    });
  });
  var ws=XLSX.utils.aoa_to_sheet(rows);
  ws["!cols"]=[{wch:24},{wch:36},{wch:10},{wch:10},{wch:16},{wch:20},{wch:14},{wch:16},{wch:20}];
  var wb=XLSX.utils.book_new();
  var date=new Date().toISOString().slice(0,10);
  var loc=(location||"Saxbys").replace(/[^a-zA-Z0-9]/g,"_");
  XLSX.utils.book_append_sheet(wb,ws,"Order Guide");
  XLSX.writeFile(wb,"Saxbys_OrderGuide_"+loc+"_"+date+".xlsx");
}

// ── RENDER ────────────────────────────────────────────────────
function render(){
  var app=document.getElementById("app");
  while(app.firstChild)app.removeChild(app.firstChild);
  var screens={upload:screenUpload,processing:screenProcessing,results:screenResults,error:screenError,orderguide:screenOrderGuide};
  app.appendChild((screens[state.screen]||screenUpload)());
}
render();
</script>
</body>
</html>
